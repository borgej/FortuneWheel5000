<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <circle cx="15" cy="16" r="16" fill="#0f172a"/>
  <!-- Wheel segments (8 x 45°, chromakey-safe palette) centred at 13,16 r=12 -->
  <path d="M13,16 L13,4 A12,12 0 0,1 21.5,8.5 Z" fill="#ef4444"/>
  <path d="M13,16 L21.5,8.5 A12,12 0 0,1 25,16 Z" fill="#f97316"/>
  <path d="M13,16 L25,16 A12,12 0 0,1 21.5,23.5 Z" fill="#f59e0b"/>
  <path d="M13,16 L21.5,23.5 A12,12 0 0,1 13,28 Z" fill="#f472b6"/>
  <path d="M13,16 L13,28 A12,12 0 0,1 4.5,23.5 Z" fill="#d946ef"/>
  <path d="M13,16 L4.5,23.5 A12,12 0 0,1 1,16 Z" fill="#a855f7"/>
  <path d="M13,16 L1,16 A12,12 0 0,1 4.5,8.5 Z" fill="#6366f1"/>
  <path d="M13,16 L4.5,8.5 A12,12 0 0,1 13,4 Z" fill="#3b82f6"/>
  <!-- Divider lines -->
  <line x1="13" y1="16" x2="13" y2="4"    stroke="#0f172a" stroke-width="1"/>
  <line x1="13" y1="16" x2="21.5" y2="8.5" stroke="#0f172a" stroke-width="1"/>
  <line x1="13" y1="16" x2="25" y2="16"   stroke="#0f172a" stroke-width="1"/>
  <line x1="13" y1="16" x2="21.5" y2="23.5" stroke="#0f172a" stroke-width="1"/>
  <line x1="13" y1="16" x2="13" y2="28"   stroke="#0f172a" stroke-width="1"/>
  <line x1="13" y1="16" x2="4.5" y2="23.5" stroke="#0f172a" stroke-width="1"/>
  <line x1="13" y1="16" x2="1" y2="16"    stroke="#0f172a" stroke-width="1"/>
  <line x1="13" y1="16" x2="4.5" y2="8.5" stroke="#0f172a" stroke-width="1"/>
  <!-- Outer ring -->
  <circle cx="13" cy="16" r="12" fill="none" stroke="#0f172a" stroke-width="1.2"/>
  <!-- Center hub -->
  <circle cx="13" cy="16" r="3" fill="#1e293b" stroke="#e2e8f0" stroke-width="0.9"/>
  <!-- Pointer: gold left-pointing arrow on the right side -->
  <polygon points="31,13 31,19 24,16" fill="#facc15"/>
  <polygon points="31,13 31,19 24,16" fill="url(#pg)" stroke="none"/>
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
</svg>
