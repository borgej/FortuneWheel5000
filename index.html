<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>FortuneWheel5000</title>
	<style>about:blank#blocked
		:root { --wheel-size: 657px; --center-col: calc(var(--wheel-size) + 32px); }
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			background: radial-gradient(1200px 800px at 10% 10%, #0f1b2e 0%, #0b1220 45%, #060911 100%);
			color: #e8ecf1; padding: 20px 20px 0 20px; overflow-x: hidden; overflow-y: hidden;
		}
		html { overflow-x: hidden; overflow-y: hidden; }
	.container { margin: 0 auto; display: grid; grid-template-columns: 360px var(--center-col) 336px; gap: 16px; overflow-x: hidden; height: calc(100vh - 40px); align-items: stretch; width: calc(360px + var(--center-col) + 336px + 32px); }
		.card, .sidebar { background: rgba(8,12,22,0.7); border-radius: 16px; padding: 16px; border: 1px solid rgba(94,234,212,0.15); backdrop-filter: blur(8px); box-shadow: 0 10px 30px rgba(0,0,0,0.35), 0 0 20px rgba(124,58,237,0.08) inset; }
		.connection-panel { display: grid; grid-template-columns: 1fr; gap: 10px; align-items: end; }
		.settings-panel { display: grid; grid-template-columns: 1fr; gap: 10px; align-items: end; }
		.keyword-row { display: flex; gap: 6px; }
		.toggle-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
		.toggle-group .toggle { display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 999px; background: rgba(30,41,59,0.55); border: 1px solid rgba(148,163,184,0.25); font-size: 12px; font-weight: 800; color: #cbd5e1; }
		.toggle-group .toggle input { width: 16px; height: 16px; }
		.keyword-prefix { width: 68px; }
		.input-group { display: flex; flex-direction: column; gap: 6px; }
		label { font-size: 13px; font-weight: 600; }
	input { padding: 10px 12px; border: 1px solid rgba(148,163,184,0.2); border-radius: 8px; background: rgba(2,6,12,0.6); color: #e5e7eb; box-shadow: 0 0 0 2px transparent inset; }
	input::placeholder { color: rgba(148,163,184,0.65); }
	button { padding: 10px 14px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; color: #ecfeff; letter-spacing: 0.3px; }
	.btn-primary { background: linear-gradient(45deg, #00e5ff, #7c3aed); box-shadow: 0 8px 20px rgba(0,229,255,0.2), 0 0 0 1px rgba(124,58,237,0.25) inset; }
	.btn-secondary { background: rgba(30,41,59,0.75); box-shadow: 0 4px 10px rgba(0,0,0,0.25), 0 0 0 1px rgba(148,163,184,0.2) inset; color: #cbd5e1; }
	.btn-danger { background: linear-gradient(45deg, #ef4444, #f97316); box-shadow: 0 8px 20px rgba(239,68,68,0.2), 0 0 0 1px rgba(249,115,22,0.25) inset; }

	/* Donate with PayPal */
	.donate-row { display: flex; justify-content: center; margin-top: 6px; }
	.paypal-button { display: inline-flex; align-items: center; gap: 5px; padding: 5px 9px; border-radius: 999px; text-decoration: none; color: #ecfeff; font-weight: 800; font-size: 11px; letter-spacing: 0.2px; background: linear-gradient(45deg, #003087, #009cde); box-shadow: 0 4px 12px rgba(0, 156, 222, 0.18), 0 0 0 1px rgba(0, 48, 135, 0.3) inset; border: 1px solid rgba(0, 156, 222, 0.3); }
	.paypal-button:hover { filter: brightness(1.06); }
	.paypal-button svg { width: 13px; height: 13px; flex: 0 0 auto; }
	.status { margin-top: 10px; border-radius: 10px; padding: 10px; font-weight: 800; text-align: center; color: #e2e8f0; }
	.status.connected { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.5); box-shadow: 0 0 10px rgba(16,185,129,0.2) inset; }
	.status.disconnected { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.45); box-shadow: 0 0 10px rgba(239,68,68,0.18) inset; }
	.status.clickable { cursor: pointer; }

	.wheel-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: var(--wheel-size); gap: 12px; max-height: calc(100vh - 40px); height: 100%; }
	/* Remove border around the wheel card only */
	.wheel-stage { position: relative; width: var(--wheel-size); height: var(--wheel-size); display: flex; align-items: center; justify-content: center; overflow: hidden; }
	.wheel { width: var(--wheel-size); height: var(--wheel-size); border-radius: 50%; position: relative; overflow: hidden; border: none; box-shadow: 0 0 40px rgba(59,130,246,0.35), 0 10px 40px rgba(0,0,0,0.45); transition: transform 4.2s cubic-bezier(0.23,1,0.32,1); }
	.wheel-pointer { display: block; position: absolute; top: 50%; right: 0; transform: translateY(-50%); width: 0; height: 0; border-top: 28px solid transparent; border-bottom: 28px solid transparent; border-left: 0 solid transparent; border-right: 56px solid #0e7490; filter: drop-shadow(0 0 10px rgba(14,116,144,0.8)); z-index: 10; }
	.empty-wheel { display: flex; align-items: center; justify-content: center; width: var(--wheel-size); height: var(--wheel-size); border: 3px dashed rgba(148,163,184,0.35); border-radius: 50%; color: rgba(203,213,225,0.8); text-align: center; padding: 16px; }
	.entry-overlay { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; pointer-events: none; z-index: 9; font-weight: 900; letter-spacing: 1px; font-size: 56px; color: #ecfeff; 
		/* Strong black outline for readability */
		-webkit-text-stroke: 2px rgba(0,0,0,0.9);
		text-shadow:
			/* black outline using multiple offsets */
			2px 0 0 #000, -2px 0 0 #000, 0 2px 0 #000, 0 -2px 0 #000,
			1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000,
			/* subtle glow on top */
			0 0 18px rgba(124,58,237,0.35), 0 0 8px rgba(34,211,238,0.45);
	}
	/* Bigger inline countdown when wheel is empty */
	#emptyWheelCountdown { font-size: 300%;
		/* Optional: keep consistent readability when wheel is empty */
		-webkit-text-stroke: 1.5px rgba(0,0,0,0.9);
		text-shadow:
			2px 0 0 #000, -2px 0 0 #000, 0 2px 0 #000, 0 -2px 0 #000,
			1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000,
			0 0 12px rgba(124,58,237,0.25), 0 0 6px rgba(34,211,238,0.35);
	}
	.stream-title { font-size: 36px; font-weight: 900; text-align: center; letter-spacing: 0.5px; margin-bottom: 6px; background: linear-gradient(90deg, #22d3ee, #a78bfa, #f472b6); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: 0 2px 18px rgba(124,58,237,0.35); }
		.stream-subtitle { font-size: 12px; text-align: center; opacity: 0.9; margin-top: -2px; margin-bottom: 8px; color: #cbd5e1; }
		.stream-subtitle a { color: #93c5fd; text-decoration: none; font-weight: 800; }
		.stream-subtitle .heart { margin: 0 2px; }
		.stream-subtitle a:hover { text-decoration: underline; }
		.giveaway-controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
	.sidebar { display: flex; flex-direction: column; gap: 16px; height: 100%; max-height: calc(100vh - 40px); overflow: auto; }
	.leftbar { display: flex; flex-direction: column; gap: 16px; height: 100%; max-height: calc(100vh - 40px); overflow-y: auto; overflow-x: hidden; }
		.participants-list h3, .history h3 { margin-bottom: 8px; }
	.participant-item { background: rgba(2,6,12,0.6); border-left: 4px solid #7c3aed; border-radius: 10px; padding: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; box-shadow: 0 1px 0 rgba(124,58,237,0.25) inset; }
	.participant-name { font-weight: 800; color: #e2e8f0; }
	.participant-info { text-align: right; font-size: 12px; color: rgba(203,213,225,0.9); }
	.follower-status { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 900; margin-bottom: 2px; }
	.follower-status.yes { background: rgba(16, 185, 129, 0.2); color: #10b981; }
	.follower-status.no { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

	/* Slide-in animation for new participants (longer + subtle bounce) */
	@keyframes slideInFromTop {
		0% { opacity: 0; transform: translateY(-26px); }
		70% { opacity: 1; transform: translateY(4px); }
		100% { opacity: 1; transform: translateY(0); }
	}
	.participant-item.animate-in { animation: slideInFromTop 700ms cubic-bezier(0.22, 1, 0.36, 1) both; will-change: transform, opacity; }
		.toolbar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
		.leftbar .settings-panel .toolbar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
		.leftbar .toolbar button { padding: 10px 12px; font-size: 14px; width: 100%; }

	.winner-announcement { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(2,6,12,0.7); z-index: 1000; backdrop-filter: blur(2px); }
	.winner-card { background: linear-gradient(135deg, #0b1220, #111827); padding: 28px; border-radius: 20px; text-align: center; min-width: 320px; box-shadow: 0 20px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(56,189,248,0.25) inset; }
	.winner-card h2 { font-size: 30px; margin-bottom: 6px; color: #93c5fd; text-shadow: 0 2px 10px rgba(59,130,246,0.5); }
	.winner-card .winner-name { font-size: 44px; font-weight: 900; margin: 8px 0 12px; color: #a78bfa; text-shadow: 0 2px 14px rgba(124,58,237,0.5); }
	.progress { width: 100%; height: 12px; background: rgba(30,41,59,0.8); border-radius: 999px; overflow: hidden; box-shadow: inset 0 2px 6px rgba(0,0,0,0.35); }
	.progress-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #06b6d4, #7c3aed); transition: width 0.25s linear; box-shadow: 0 0 12px rgba(124,58,237,0.4); }
	.progress-bar.low { background: linear-gradient(90deg, #ef4444, #f59e0b); }

		@media (max-width: 980px) {
			.container { grid-template-columns: 1fr; width: auto; }
			:root { --wheel-size: 420px; }
			.entry-overlay { font-size: 40px; }
		}

		/* Desktop XL: scale up wheel and columns to fit 1920x1080 cleanly */
		@media (min-width: 1600px) {
			:root { --wheel-size: 765px; --center-col: calc(var(--wheel-size) + 32px); }
			.container { grid-template-columns: 380px var(--center-col) 352px; width: calc(380px + var(--center-col) + 352px + 32px); }
			.entry-overlay { font-size: 64px; }
			.stream-title { font-size: 40px; }
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="leftbar">
			<div class="stream-title" id="streamTitle">FortuneWheel5000</div>
			<div class="stream-subtitle">made with <span class="heart" role="img" aria-label="love">❤️</span> by <a href="http://www.twitch.tv/beejeey" target="_blank" rel="noopener noreferrer">BeeJeey</a></div>
			<div class="donate-row" id="donateRow">
				<a class="paypal-button" id="donateLink" href="https://paypal.me/borgej" target="_blank" rel="noopener noreferrer" title="Donate with PayPal">
					<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
						<path fill="currentColor" d="M8 5h6a4 4 0 0 1 0 8h-4l-1 4H6L8 5zm4 2h-3l-1.5 8H9l1-4h3a2 2 0 0 0 0-4z"/>
					</svg>
					<span id="donateLabel">Donate</span>
				</a>
			</div>
			<div class="card">
				<div id="connectionPanel" class="connection-panel">
					<div class="input-group">
						<label for="clientId">Twitch Client ID</label>
						<input id="clientId" type="text" placeholder="Enter Twitch Client ID" />
					</div>
					<div class="input-group">
						<label for="channelName">Channel Name</label>
						<input id="channelName" type="text" placeholder="yourchannel" />
					</div>
					<div class="toolbar">
						<!-- Swap order: Connect before Authorize -->
						<button id="connectBtn" class="btn-primary">Connect</button>
						<button id="authBtn" class="btn-primary">Authorize</button>
						<button id="disconnectBtn" class="btn-secondary" style="display:none">Disconnect</button>
						<label style="display:inline-flex;align-items:center;gap:6px;font-size:12px;opacity:.9;margin-left:auto">
							<input id="hideSensitive" type="checkbox" /> Hide Client ID
						</label>
					</div>
				</div>
				<div id="connectionStatus" class="status disconnected">Enter Client ID and authorize with Twitch</div>
			</div>

			<!-- Giveaway Settings Card -->
			<div class="card">
				<h3 style="margin-bottom:8px">Giveaway</h3>
				<div class="settings-panel">
					<div class="input-group">
						<label for="keyword">Giveaway Keyword</label>
						<div class="keyword-row">
							<input id="keywordPrefix" class="keyword-prefix" type="text" placeholder="!" value="!" />
							<input id="keyword" type="text" placeholder="giveaway" value="giveaway" />
						</div>
					</div>
					<div class="input-group">
						<label for="entryTimerMinutes">Entry Timer (minutes) — 0 for unlimited</label>
						<input id="entryTimerMinutes" type="number" min="0" step="1" placeholder="0" />
					</div>
					<div class="input-group">
						<label for="winnerTimerMinutes">Winner Timer (minutes) — 0 for unlimited</label>
						<input id="winnerTimerMinutes" type="number" min="0" step="1" placeholder="2" />
					</div>
					<div class="toolbar" style="grid-column: 1 / -1; margin-bottom:8px;">
						<button id="startGiveawayBtn" class="btn-primary" title="Open entries (or stop the current giveaway)">Start Giveaway</button>
						<button id="lockBtn" class="btn-secondary" title="Toggle accepting entries">Lock Entries</button>
						<button id="debugAddBtn" class="btn-secondary" title="Add 10–30 random test participants (debug)">Add Test Participants</button>
					</div>
					<div class="toggle-group" style="grid-column: 1 / -1;">
						<label class="toggle" title="Show confetti when someone wins">
							<input id="confettiToggle" type="checkbox" checked /> Confetti on win
						</label>
						<label class="toggle" title="Show sad faces when the winner times out">
							<input id="sadToggle" type="checkbox" checked /> Sad faces on timeout
						</label>
						<label class="toggle" title="Play tick sounds while spinning">
							<input id="tickToggle" type="checkbox" checked /> Tick sounds
						</label>
					</div>
				</div>
			</div>

			<!-- Giveaway History Card (moved from right sidebar) -->
			<div class="card">
				<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
					<h3 style="margin:0">Giveaway History</h3>
					<button id="clearHistoryBtn" class="btn-secondary" style="padding:6px 10px;font-size:12px">Clear</button>
				</div>
				<div id="historyList"></div>
			</div>
		</div>

		<div class="card wheel-container">
				<div class="wheel-stage">
					<div class="wheel-pointer"></div>
					<div id="wheelElement" class="empty-wheel">
						<div>Connect and set a keyword to start collecting participants.</div>
					</div>
					<div id="entryOverlay" class="entry-overlay" aria-live="polite"></div>
				</div>
				<div id="wheelInfo" style="opacity:.9;font-size:12px;margin-top:4px"></div>
				<div id="entryInfo" style="opacity:.9;font-size:12px;margin-top:2px"></div>
				<div class="giveaway-controls">
					<button id="spinBtn" class="btn-primary" disabled>Spin the Wheel</button>
					<button id="clearBtn" class="btn-danger">Clear Participants</button>
				</div>
			</div>

		<div class="sidebar">
			<div class="participants-list">
				<h3>Participants (<span id="participantCount">0</span>)</h3>
				<div id="participantsList"></div>
			</div>
		</div>
	</div>

	<div id="winnerModal" class="winner-announcement">
		<div class="winner-card">
			<h2>Winner</h2>
			<div id="winnerName" class="winner-name"></div>
			<div id="winnerMeta" style="margin-bottom:12px;font-weight:600"></div>
			<div id="winnerTimer" style="font-weight:800;margin-bottom:8px">00:00</div>
			<div class="progress" style="margin-bottom:10px;">
				<div id="winnerProgress" class="progress-bar" aria-label="Time remaining"></div>
			</div>
			<div id="winnerChat" class="winner-chat" style="text-align:left;max-height:160px;overflow:auto;background:rgba(255,255,255,0.2);border-radius:10px;padding:8px;margin-bottom:12px"></div>
			<div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap">
				<button id="reSpinBtn" class="btn-danger" title="Re-spin and exclude current winner">Re-spin (exclude)</button>
				<button id="closeWinnerBtn" class="btn-secondary">Close</button>
			</div>
		</div>
	</div>

	<!-- Confetti Canvas -->
	<canvas id="confettiCanvas" style="position:fixed;inset:0;pointer-events:none;z-index:1500"></canvas>

	<!-- Toasts -->
	<div id="toastContainer" style="position:fixed;right:16px;bottom:16px;display:flex;flex-direction:column;gap:8px;z-index:2000"></div>

	<!-- Confirm Modal -->
	<div id="confirmModal" class="winner-announcement" style="z-index:2001;display:none">
		<div class="winner-card" style="min-width:340px;">
			<h2 id="confirmTitle">Please confirm</h2>
			<div id="confirmMessage" style="margin:12px 0 20px;opacity:.95"></div>
			<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
				<button id="confirmYes" class="btn-danger">Yes</button>
				<button id="confirmNo" class="btn-secondary">No</button>
			</div>
		</div>
	</div>

	<script>
		// Load tmi.js with fallbacks (unpkg)
		(function loadTmi(urls){
			function tryNext(i){
				if(i>=urls.length){ console.error('Failed to load tmi.js'); return; }
				var s=document.createElement('script');
				s.src=urls[i];
				s.async=true;
				s.onload=function(){ console.log('tmi.js loaded from', urls[i]); };
				s.onerror=function(){ console.warn('tmi.js failed from', urls[i]); tryNext(i+1); };
				document.head.appendChild(s);
			}
			tryNext(0);
		})([
			'./tmi.min.js',
			'./tmi.js',
			'https://unpkg.com/tmi.js@1.8.5/dist/tmi.min.js'
		]);
	</script>
	<script>
		// App configuration: set enableFollowerInfo=false to disable Twitch authorization
		// and hide follower info everywhere. Edit this value to control behavior.
		const APP_CONFIG = {
			// Not finished yet, do not turn on 
			enableFollowerInfo: false,
			donate: {
				enabled: false,
				url: 'https://paypal.me/borgej',
				label: 'Donate'
			},
			ui: {
				showAddTestParticipants: true
			},
			features: {

				sad: true,
				tick: false

			defaults: {
				keywordPrefix: '!',
				keywordText: 'giveaway',
				winnerTimerMinutes: 2,
				entryTimerMinutes: 0
			}
		};
	</script>
	<script>
		class SimpleCanvasWheel {
			constructor(container, { items = [], onSpin, onCurrentIndexChange, onRest } = {}) {
				this.container = container;
				this.items = items;
				this.onSpin = onSpin;
				this.onCurrentIndexChange = onCurrentIndexChange;
				this.onRest = onRest;
				this.rotation = 0; // radians; 0 means slice 0 starts at pointer (3 o'clock)
				this.anim = null;
				this._lastIndex = null;
				this.canvas = document.createElement('canvas');
				this.ctx = this.canvas.getContext('2d');
				this.canvas.style.width = '100%';
				this.canvas.style.height = '100%';
				this.canvas.style.display = 'block';
				this.canvas.setAttribute('aria-hidden', 'true');
				this.container.appendChild(this.canvas);
				this._ro = new ResizeObserver(() => this.resize());
				this._ro.observe(this.container);
				this.resize();
			}

			setItems(items) { this.items = items || []; this.draw(); }

			resize() {
				const dpr = window.devicePixelRatio || 1;
				const w = Math.max(10, this.container.clientWidth);
				const h = Math.max(10, this.container.clientHeight);
				this.canvas.width = Math.floor(w * dpr);
				this.canvas.height = Math.floor(h * dpr);
				this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
				this.draw();
			}

			get sliceAngle() { return this.items.length > 0 ? (Math.PI * 2) / this.items.length : Math.PI * 2; }

			currentIndex() {
				if (!this.items.length) return 0;
				const a = (2*Math.PI - (this.rotation % (2*Math.PI))) % (2*Math.PI);
				return Math.floor(a / this.sliceAngle) % this.items.length;
			}

				draw() {
				const { width, height } = this.canvas;
				const w = width / (window.devicePixelRatio || 1);
				const h = height / (window.devicePixelRatio || 1);
				const ctx = this.ctx;
				ctx.clearRect(0, 0, w, h);
				if (!this.items.length) return;
				const cx = w / 2, cy = h / 2;
				const r = Math.min(w, h) * 0.48;
				ctx.save();
				ctx.translate(cx, cy);
				ctx.rotate(this.rotation);
				const slice = this.sliceAngle;
				for (let i = 0; i < this.items.length; i++) {
					const it = this.items[i];
					const start = i * slice;
					const end = start + slice;
					// slice fill
					ctx.beginPath();
					ctx.moveTo(0, 0);
					ctx.arc(0, 0, r, start, end, false);
					ctx.closePath();
					ctx.fillStyle = it.backgroundColor || '#999';
					ctx.fill();
					// slice border
					ctx.strokeStyle = 'rgba(255,255,255,0.25)';
					ctx.lineWidth = 2;
					ctx.stroke();
					// label
						const mid = start + slice / 2;
						ctx.save();
						// Rotate to slice mid-angle
						ctx.rotate(mid);
						// Place text near the outer rim, upright, and make it read from rim toward center
						// Strategy: keep text upright (no extra flip), right-align at the outer radius, so glyphs extend inward
						ctx.textAlign = 'right';
						ctx.textBaseline = 'middle';
						const maxFont = Math.max(12, Math.min(24, r * 0.08));
						ctx.font = `${Math.floor(maxFont)}px Segoe UI, sans-serif`;
						ctx.fillStyle = it.labelColor || '#111827';
						const outer = r * 0.94; // just inside rim
						const inner = r * 0.25; // min inner radius for labels
						const pathLen = outer - inner;
						// Move to the rim along the slice axis; do not rotate by PI/2 so text stays upright relative to screen
						ctx.translate(outer, 0);
						const text = (it.label || '').toString();
						let clipped = text;
						// Trim to available inward length
						while (clipped.length > 1 && ctx.measureText(clipped).width > pathLen) {
							clipped = clipped.slice(0, -1);
						}
						// Right-align at the rim so the text extends inward toward center
						ctx.fillText(clipped, 0, 0);
						ctx.restore();
				}
				// outer border
				ctx.beginPath();
				ctx.arc(0, 0, r + 6, 0, Math.PI * 2);
				ctx.strokeStyle = 'rgba(56,189,248,0.35)';
				ctx.lineWidth = 6;
				ctx.stroke();
				ctx.restore();
			}

			spinToIndex(targetIndex, durationMs = 5000, revolutions = 3) {
				if (!this.items.length) return;
				if (typeof this.onSpin === 'function') { try { this.onSpin(); } catch {} }
				const slice = this.sliceAngle;
				// We want the mid of target slice at the pointer (angle 0, i.e., 3 o'clock)
				// Compute absolute target angle for the wheel (its internal rotation), then convert to a positive delta from current
				const desired = (2*Math.PI - (targetIndex + 0.5) * slice) % (2*Math.PI);
				const start = this.rotation % (2*Math.PI);
				let delta = (desired - start);
				// Normalize to [0, 2π)
				delta = (delta % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
				// Add full revolutions for a nice spin
				const end = start + (Math.PI * 2) * revolutions + delta;
				const t0 = performance.now();
				const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
				const step = (now) => {
					const dt = Math.min(1, (now - t0) / durationMs);
					const eased = easeOutCubic(dt);
					this.rotation = start + (end - start) * eased;
					this.draw();
					const idx = this.currentIndex();
					if (idx !== this._lastIndex) {
						this._lastIndex = idx;
						if (typeof this.onCurrentIndexChange === 'function') { try { this.onCurrentIndexChange({ currentIndex: idx }); } catch {} }
					}
					if (dt < 1) {
						this.anim = requestAnimationFrame(step);
					} else {
						this.rotation = this.rotation % (2*Math.PI);
						this.draw();
						const ci = this.currentIndex();
						if (typeof this.onRest === 'function') { try { this.onRest({ currentIndex: ci }); } catch {} }
					}
				};
				if (this.anim) cancelAnimationFrame(this.anim);
				this.anim = requestAnimationFrame(step);
			}

			destroy() {
				try { if (this.anim) cancelAnimationFrame(this.anim); } catch {}
				try { if (this._ro) this._ro.disconnect(); } catch {}
				try { this.canvas.remove(); } catch {}
			}
		}

		// Minimal Twitch IRC over WebSocket client as a fallback when tmi.js is unavailable
		class TwitchWSChat {
			constructor(channel, { onMessage, onConnected, onDisconnected }) {
				this.channel = channel.startsWith('#') ? channel : `#${channel}`;
				this.onMessage = onMessage;
				this.onConnected = onConnected;
				this.onDisconnected = onDisconnected;
				this.ws = null;
				this.nick = `justinfan${Math.floor(Math.random()*1e8)}`; // anonymous
				this.heartbeat = null;
			}

			connect() {
				return new Promise((resolve, reject) => {
					try {
						this.ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
						this.ws.addEventListener('open', () => {
							// Request tags/commands and send PASS/NICK/JOIN
							this._send('CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership');
							this._send('PASS SCHMOOPIIE'); // placeholder for anonymous
							this._send(`NICK ${this.nick}`);
							this._send(`JOIN ${this.channel}`);
							if (this.onConnected) this.onConnected();
							resolve();
							// Start keepalive
							this._startHeartbeat();
						});
						this.ws.addEventListener('message', (ev) => this._handleRaw(ev.data));
						this.ws.addEventListener('close', () => { this._stopHeartbeat(); if (this.onDisconnected) this.onDisconnected(); });
						this.ws.addEventListener('error', (e) => { console.error('WS error', e); });
					} catch (e) {
						reject(e);
					}
				});
			}

			disconnect() { try { this._stopHeartbeat(); this.ws && this.ws.close(); } catch {} }

			_send(line) { try { this.ws && this.ws.send(`${line}\r\n`); } catch {} }

			_startHeartbeat() {
				if (this.heartbeat) clearInterval(this.heartbeat);
				this.heartbeat = setInterval(() => { try { this._send('PING :tmi.twitch.tv'); } catch {} }, 4 * 60 * 1000);
			}

			_stopHeartbeat() { if (this.heartbeat) { clearInterval(this.heartbeat); this.heartbeat = null; } }

			_handleRaw(data) {
				const lines = data.split('\r\n').filter(Boolean);
				for (const line of lines) {
					if (line.startsWith('PING')) { this._send(line.replace('PING', 'PONG')); continue; }
					// Example: @tags :nick!user@host PRIVMSG #channel :message
					let rest = line;
					let tags = {};
					if (rest[0] === '@') {
						const space = rest.indexOf(' ');
						const rawTags = rest.slice(1, space).split(';');
						rawTags.forEach(kv => { const [k,v] = kv.split('='); tags[k] = v; });
						rest = rest.slice(space + 1);
					}
					let prefix = '';
					if (rest[0] === ':') {
						const space = rest.indexOf(' ');
						prefix = rest.slice(1, space);
						rest = rest.slice(space + 1);
					}
					const cmdEnd = rest.indexOf(' ');
					const command = cmdEnd === -1 ? rest : rest.slice(0, cmdEnd);
					rest = cmdEnd === -1 ? '' : rest.slice(cmdEnd + 1);
					if (command === 'PRIVMSG') {
						// params: <target> :<message>
						const idx = rest.indexOf(' :');
						const params = idx === -1 ? rest : rest.slice(0, idx);
						const message = idx === -1 ? '' : rest.slice(idx + 2);
						// derive username
						let username = tags['display-name'] || '';
						if (!username && prefix) {
							const excl = prefix.indexOf('!');
							if (excl > 0) username = prefix.slice(0, excl);
						}
						if (this.onMessage) this.onMessage({ username: (username||'').toLowerCase() }, message);
					}
				}
			}
		}
	</script>

			// Parse access_token from URL hash (Twitch implicit grant) and stash it for this session
			checkForToken() {
				if (!APP_CONFIG.enableFollowerInfo) {
					this.setStatus('Follower info disabled. You can still connect to chat.', false);
					return;
				}
				try {
					const hash = (window.location.hash || '').replace(/^#/, '');
					if (hash) {
						const params = new URLSearchParams(hash);
						const tok = params.get('access_token');
						if (tok) {
							this.accessToken = tok;
							// Store in session only (avoid persisting long-term)
							sessionStorage.setItem('mw.accessToken', tok);
							// Clean hash from URL
							history.replaceState(null, document.title, window.location.pathname + window.location.search);
							this.setStatus('Authorized with Twitch • follower info enabled', true);
							return;
						}
					}
					// Fall back to any token in session storage
					const saved = sessionStorage.getItem('mw.accessToken');
					if (saved) {
						this.accessToken = saved;
						this.setStatus('Authorized with Twitch • follower info enabled', true);
						return;
					}
				} catch {}
				// No token: keep optional notice
				this.setStatus('Optional: Authorize to enable follower info. You can still connect to chat.', false);
			}

			// Kick off Twitch OAuth implicit grant using the provided Client ID
			authorizeWithTwitch() {
				if (!APP_CONFIG.enableFollowerInfo) { this.showToast('Follower authorization is disabled in config.', 'warn'); return; }
				const clientId = (this.elements.clientIdInput.value || '').trim();
				if (!clientId) { this.showToast('Enter your Twitch Client ID first', 'warn'); return; }
				const redirectUri = window.location.origin + window.location.pathname;
				const scopes = [
					'moderator:read:followers'
				];
				const state = Math.random().toString(36).slice(2);
				const authUrl = new URL('https://id.twitch.tv/oauth2/authorize');
				authUrl.searchParams.set('client_id', clientId);
				authUrl.searchParams.set('redirect_uri', redirectUri);
				authUrl.searchParams.set('response_type', 'token');
				authUrl.searchParams.set('scope', scopes.join(' '));
				authUrl.searchParams.set('state', state);
				// Navigate to Twitch for consent
				window.location.href = authUrl.toString();
			}

			applyUrlParams() {
				const params = new URLSearchParams(window.location.search);
				if (!params) return;
				const pClient = params.get('clientId');
				const pChannel = params.get('channel');
				const pKeyword = params.get('keyword'); // e.g. !giveaway or giveaway
				const pAuto = params.get('autoconnect'); // '1' | 'true'
				if (pClient) this.elements.clientIdInput.value = pClient;
				if (pChannel) this.elements.channelInput.value = pChannel;
				if (pKeyword) {
					if (pKeyword.startsWith('!')) {
						this.elements.keywordPrefixInput.value = '!';
						this.elements.keywordInput.value = pKeyword.slice(1);
					} else {
						this.elements.keywordPrefixInput.value = '!';
						this.elements.keywordInput.value = pKeyword;
					}
					this.keywordPrefix = this.elements.keywordPrefixInput.value.trim();
					this.keywordText = this.elements.keywordInput.value.trim();
					this.updateCombinedKeyword();
				} else if (APP_CONFIG.defaults) {
					// Apply configured defaults when no keyword provided in URL
					this.elements.keywordPrefixInput.value = APP_CONFIG.defaults.keywordPrefix ?? this.elements.keywordPrefixInput.value;
					this.elements.keywordInput.value = APP_CONFIG.defaults.keywordText ?? this.elements.keywordInput.value;
					this.keywordPrefix = (this.elements.keywordPrefixInput.value || '').trim();
					this.keywordText = (this.elements.keywordInput.value || '').trim();
					this.updateCombinedKeyword();
				}
				// Save and optionally auto-connect
				this.saveToStorage();
				if (pAuto && (/^1|true$/i).test(pAuto)) {
					setTimeout(() => this.connectToChat(), 0);
				}
				if (APP_CONFIG.enableFollowerInfo) {
					this.setStatus('Optional: Authorize to enable follower info. You can still connect to chat.', false);
				} else {
					this.setStatus('Follower info disabled. You can still connect to chat.', false);
				}
			}

			async connectToChat() {
				this.channelName = this.elements.channelInput.value.trim().toLowerCase();
				if (!this.channelName) { this.showToast('Please enter a channel name'); return; }

				// Collapse immediately after clicking Connect so the top container hides on stream
				this.collapseConnectionPanel();

				try {
					// Fetch broadcaster/channel ID for follower lookups
					await this.fetchChannelId();

					if (typeof window.tmi !== 'undefined') {
						this.client = new window.tmi.Client({ connection: { reconnect: true }, channels: [this.channelName] });
						this.client.on('message', (_ch, tags, message) => this.handleChatMessage(tags, message));
						this.client.on('connected', () => {
							this.isConnected = true;
							this.updateConnectionButtons();
							this.setStatus(`Connected to #${this.channelName}`, true);
							this.renderWheel();
							this.autoCollapseConnectionPanel();
						});

								this.isConnected = true;
								this.updateConnectionButtons();
								this.setStatus(`Connected to #${this.channelName}`, true);
								this.renderWheel();
								this.autoCollapseConnectionPanel();
							},
							onDisconnected: () => { this.isConnected = false; this.updateConnectionButtons(); this.setStatus('Disconnected from chat', false); },
						});
						await this.client.connect();
					}
				} catch (err) {
					console.error(err);
					this.showToast('Failed to connect. Check channel name.', 'error');

					this.expandConnectionPanel();

			async fetchChannelId() {
				if (!APP_CONFIG.enableFollowerInfo || !this.accessToken || !this.clientId) { this.channelId = null; return; }
				try {
					const resp = await fetch(`https://api.twitch.tv/helix/users?login=${encodeURIComponent(this.channelName)}`, {
						headers: { 'Authorization': `Bearer ${this.accessToken}`, 'Client-Id': this.clientId }
					});
					const data = await resp.json();
					this.channelId = data?.data?.[0]?.id || null;
				} catch (e) {
					console.warn('Failed to get channelId; follower info may be limited');
					this.channelId = null;
				}
			}

			disconnectFromChat() {
				if (this.client) { try { this.client.disconnect(); } catch (e) {} this.client = null; }
				this.isConnected = false;
				this.updateConnectionButtons();
				this.setStatus('Disconnected from chat', false);
				// Reveal connection controls when disconnected
				this.expandConnectionPanel();
			}

			updateConnectionButtons() {
				this.elements.connectBtn.style.display = this.isConnected ? 'none' : 'inline-block';
				this.elements.disconnectBtn.style.display = this.isConnected ? 'inline-block' : 'none';

			collapseConnectionPanel() {
				if (!this.elements.connectionPanel) return;
				this.elements.connectionPanel.style.display = 'none';
				localStorage.setItem('mw.connCollapsed', '1');
			}

			expandConnectionPanel() {
				if (!this.elements.connectionPanel) return;
				this.elements.connectionPanel.style.display = '';
				localStorage.setItem('mw.connCollapsed', '0');
			}

			toggleConnectionPanel() {
				if (!this.elements.connectionPanel) return;
				const isHidden = this.elements.connectionPanel.style.display === 'none';
				if (isHidden) this.expandConnectionPanel(); else this.collapseConnectionPanel();
			}

			autoCollapseConnectionPanel() {
				// Only auto-collapse if user hasn't chosen to keep it expanded
				const pref = localStorage.getItem('mw.connCollapsed');
				if (pref === '0') return; // user prefers expanded
				this.collapseConnectionPanel();
			}

			setStatus(text, connected) {
				this.elements.connectionStatus.textContent = text;
				this.elements.connectionStatus.className = `status ${connected ? 'connected' : 'disconnected'}`;
			}

			toggleEntries() {
				this.keywordActive = !this.keywordActive;
				this.elements.lockBtn.textContent = this.keywordActive ? 'Lock Entries' : 'Unlock Entries';
			}

			toggleGiveaway() {
				// Use explicit flag to avoid ambiguous state requiring multiple clicks
				if (this.giveawayActive) { this.stopEntries(); } else { this.startGiveaway(); }
			}

			startGiveaway() {
				// Open entries and optionally start an entry timer
				this.giveawayActive = true;
				this.excludedWinners = new Set();
				this.keywordActive = true;
				this.elements.lockBtn.textContent = 'Lock Entries';
				this.entryStartTime = Date.now();
				this.entryTotalSeconds = Math.max(0, Math.floor((this.entryTimerMinutes||0) * 60));
				this.updateEntryInfo();
				if (this.entryTimerInterval) clearInterval(this.entryTimerInterval);
				if (this.entryTotalSeconds > 0) {
					this.entryTimerInterval = setInterval(()=>this.updateEntryInfo(), 1000);
				}
				// Start a new giveaway session id; history entry created on first winner
				this.giveawaySessionId = 'g-' + Date.now();
				this.currentHistoryIndex = null;
				// Flip Start button to Stop Giveaway state
				this.elements.startGiveawayBtn.textContent = 'Stop Giveaway';
				this.elements.startGiveawayBtn.classList.remove('btn-primary');
				this.elements.startGiveawayBtn.classList.add('btn-danger');
				// Refresh wheel empty-state message to show keyword prompt
				this.renderWheel();
			}

			stopEntries() {
				this.giveawayActive = false;
				this.keywordActive = false;
				this.elements.lockBtn.textContent = 'Unlock Entries';
				if (this.entryTimerInterval) clearInterval(this.entryTimerInterval);
				this.entryTimerInterval = null;
				this.updateEntryInfo(true);
				// Refresh wheel empty-state message to pre-start hint
				this.renderWheel();
				// Mark current session as ended in history if present
				if (this.currentHistoryIndex != null && this.history[this.currentHistoryIndex]) {
					this.history[this.currentHistoryIndex].endedAt = Date.now();
					this.saveToStorage();
					this.renderHistory();
				}
				// Flip Start button back to Start Giveaway state
				this.elements.startGiveawayBtn.textContent = 'Start Giveaway';
				this.elements.startGiveawayBtn.classList.remove('btn-danger');
				this.elements.startGiveawayBtn.classList.add('btn-primary');
				// Cancel any scheduled debug additions
				if (this._debugTimeouts && this._debugTimeouts.length) {
					for (const id of this._debugTimeouts) { try { clearTimeout(id); } catch {} }
					this._debugTimeouts = [];
				}
			}

			addDebugParticipants() {
				// Add 10–100 random test participants distributed over remaining entry time
				if (!this.keywordActive) { this.showToast('Entries are closed. Start the giveaway first.'); return; }
				const count = 10 + Math.floor(Math.random()*91); // 10..100
				let remainMs = 0;
				if (this.entryTotalSeconds && this.entryTotalSeconds > 0) {
					const elapsed = Math.max(0, Math.floor((Date.now()-this.entryStartTime)/1000));
					const remaining = Math.max(0, (this.entryTotalSeconds - elapsed));
					remainMs = Math.max(500, remaining * 1000);
				} else {
					// No timer: spread within 5 seconds
					remainMs = 5000;
				}
				// Add a few immediately for instant feedback
				const immediate = Math.min(3, count);
				for (let j=0; j<immediate; j++) this._addOneTestParticipant();
				// Schedule the remaining across the window
				for (let i=immediate; i<count; i++) {
					const delay = Math.random() * remainMs;
					const id = setTimeout(()=>{
						if (!this.keywordActive) return; // entries closed mid-way
						this._addOneTestParticipant();
					}, delay);
					this._debugTimeouts.push(id);
				}
				this.showToast(`Adding ${count} test participant(s)`, 'info');
			}

			_addOneTestParticipant() {
				// Ensure unique username
				let name;
				do {
					name = ('tester' + Math.floor(Math.random()*1e6)).toLowerCase();
				} while (this.participants.has(name));
				const follow = Math.random() < 0.6;
				const followData = { isFollower: follow, followDurationDays: 0, followDurationText: follow ? 'Unknown' : 'Not following' };
				this.participants.set(name, { followData, ts: Date.now() });
				if (!this._newlyAdded) this._newlyAdded = new Set();
				this._newlyAdded.add(name);
				this.saveToStorage();
				this.renderParticipants();
				this.renderWheel();
			}

			updateEntryInfo(forceStop=false) {
				const infoEl = this.elements.entryInfo;
				const overlayEl = this.elements.entryOverlay;
				const emptyCountdown = document.getElementById('emptyWheelCountdown');
				if (!infoEl) return;
				if (!this.keywordActive) {
					infoEl.textContent = 'Entries are closed';
					if (overlayEl) overlayEl.style.display = 'none';
					if (emptyCountdown) emptyCountdown.style.display = 'none';
					return;
				}
				if (forceStop || !this.entryTotalSeconds || this.entryTotalSeconds <= 0) {
					infoEl.textContent = `Entries are open${(this.entryTimerMinutes ?? 0) === 0 ? ' (no timer)' : ''}`;
					if (overlayEl) overlayEl.style.display = 'none';
					if (emptyCountdown) emptyCountdown.style.display = 'none';
					return;
				}
				const elapsed = Math.max(0, Math.floor((Date.now()-this.entryStartTime)/1000));
				const remaining = Math.max(0, this.entryTotalSeconds - elapsed);
				const mm = String(Math.floor(remaining/60)).padStart(2,'0');
				const ss = String(remaining%60).padStart(2,'0');
				infoEl.textContent = `Entries close in ${mm}:${ss}`;
				const hasSlices = !!(this.wheel); // when wheel exists, we use overlay; otherwise inline above message
				if (overlayEl) {
					overlayEl.textContent = `${mm}:${ss}`;
					overlayEl.style.display = (remaining > 0 && hasSlices) ? 'flex' : 'none';
				}
				if (emptyCountdown) {
					emptyCountdown.textContent = `${mm}:${ss}`;
					emptyCountdown.style.display = (remaining > 0 && !hasSlices) ? 'block' : 'none';
				}
				if (remaining <= 0) {
					this.stopEntries();
				}
			}

			applyHideSensitive() {
				const hide = !!this.elements.hideSensitive.checked;
				// Mask/unmask only the Client ID field
				this.elements.clientIdInput.type = hide ? 'password' : 'text';
				// Do not mask channel name or status; persist preference
				this.saveToStorage();
			}

			async handleChatMessage(tags, message) {
				const rawMsg = (message || '').trim();

				// Robust username extraction
				let username = '';
				if (tags) {
					username = (tags.username || tags['display-name'] || tags.login || '').toString().toLowerCase();
				}

				// Always allow winner messages to be processed/logged
				if (this.currentWinner && username === this.currentWinner && rawMsg) {
					this.appendWinnerMessage(username, rawMsg);
					if (!this.winnerAcknowledged) {
						this.winnerAcknowledged = true;
						this.stopWinnerTimer();
						this.elements.winnerTimer.textContent = 'Winner is not pooping!';
					}
				}

				// If entries are locked, don't add participants—but we still logged winner messages above
				if (!this.keywordActive) return;

				const msg = rawMsg.toLowerCase();
				// Support an explicit join command regardless of configured keyword
				const wantsJoin = /^!me(?=\s|$|[.,!?;:])/i.test(rawMsg);
				let containsKeyword = false;
				if (!wantsJoin) {
					const kw = ((this.keywordPrefix || '') + (this.keywordText || '')).trim().toLowerCase();
					if (kw) {
						// Match keyword as a standalone token anywhere in the message
						const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
						const re = new RegExp(`(^|\\s)${escaped}(?=\\s|$|[.,!?;:])`);
						containsKeyword = re.test(msg);
					}
				}
				if (!wantsJoin && !containsKeyword) return;

				if (!username || this.participants.has(username)) return;

				const followData = await this.getFollowerInfo(username);
				this.participants.set(username, { followData, ts: Date.now() });
				// Mark newly added user for slide-in animation
				if (!this._newlyAdded) this._newlyAdded = new Set();
				this._newlyAdded.add(username);
				this.saveToStorage();
				this.renderParticipants();
				this.renderWheel();
			}

			async getFollowerInfo(username) {
				if (!APP_CONFIG.enableFollowerInfo) {
					return { isFollower: false, followDurationDays: 0, followDurationText: '' };
				}
				// Try Helix first; gracefully degrade to unknown
				if (this.accessToken && this.clientId && this.channelId) {
					try {
						// Newer endpoint: Get list of followers for a channel needs moderator:read:followers
						// Try channels/followers?broadcaster_id=...&user_id=...
						const url = `https://api.twitch.tv/helix/channels/followers?broadcaster_id=${this.channelId}&user_id=${encodeURIComponent(await this.resolveUserId(username))}`;
						const resp = await fetch(url, { headers: { 'Authorization': `Bearer ${this.accessToken}`, 'Client-Id': this.clientId } });
						const data = await resp.json();
						if (data?.data && data.data.length > 0) {
							const followedAt = new Date(data.data[0].followed_at);
							return { isFollower: true, followDurationDays: this.daysSince(followedAt), followDurationText: this.formatDuration(this.daysSince(followedAt)) };
						} else {
							return { isFollower: false, followDurationDays: 0, followDurationText: 'Not following' };
						}
					} catch (e) {
						console.warn('Follower lookup failed; falling back');
					}
				}
				// Fallback: unknown (don’t guess)
				return { isFollower: false, followDurationDays: 0, followDurationText: 'Unknown' };
			}

			async resolveUserId(username) {
				if (!APP_CONFIG.enableFollowerInfo) return '';
				const resp = await fetch(`https://api.twitch.tv/helix/users?login=${encodeURIComponent(username)}`, {
					headers: { 'Authorization': `Bearer ${this.accessToken}`, 'Client-Id': this.clientId }
				});
				const data = await resp.json();
				return data?.data?.[0]?.id || '';
			}

			daysSince(date) { return Math.max(0, Math.floor((Date.now() - date.getTime()) / (1000*60*60*24))); }
			formatDuration(days) { if (days < 30) return `${days} days`; if (days < 365) return `${Math.floor(days/30)} months`; return `${Math.floor(days/365)} years`; }

			updateCombinedKeyword() {
				this.keyword = ((this.keywordPrefix || '') + (this.keywordText || '')).trim();
				this.saveToStorage();
				this.renderWheel();
			}

			render() {
				// Keep lock button label in sync with state
				if (this.elements && this.elements.lockBtn) {
					this.elements.lockBtn.textContent = this.keywordActive ? 'Lock Entries' : 'Unlock Entries';
				}
				this.renderParticipants(); this.renderWheel(); this.renderHistory(); this.updateEntryInfo();
			}

			renderParticipants() {
				this.elements.participantCount.textContent = this.participants.size.toString();
				this.elements.participantsList.innerHTML = '';
				const sorted = Array.from(this.participants.entries()).sort((a,b) => b[1].ts - a[1].ts);
				for (const [username, data] of sorted) {
					const item = document.createElement('div');
					const animate = this._newlyAdded && this._newlyAdded.has(username);
					item.className = 'participant-item' + (animate ? ' animate-in' : '');
					// Apply slice color if mapped
					if (this.sliceColorMap && this.sliceColorMap.has(username)) {
						const c = this.sliceColorMap.get(username);
						item.style.borderLeftColor = c;
					}
					const followHtml = APP_CONFIG.enableFollowerInfo ? `
						<div class="participant-info">
							<div class="follower-status ${data.followData.isFollower ? 'yes' : 'no'}">${data.followData.isFollower ? 'Follower' : 'Not Following'}</div>
							<div>${data.followData.followDurationText}</div>
						</div>` : '';
					item.innerHTML = `
						<div class="participant-name">${username}</div>
						${followHtml}`;
					this.elements.participantsList.appendChild(item);
				}
					// Defer clearing the animation marks to allow animations to complete (matches 700ms CSS)
					if (this._newlyAddedClearTimer) { try { clearTimeout(this._newlyAddedClearTimer); } catch {} }
					this._newlyAddedClearTimer = setTimeout(() => { if (this._newlyAdded) this._newlyAdded.clear(); }, 750);
			}

			renderWheel() {
				const el = this.elements.wheelElement;
				const info = document.getElementById('wheelInfo');
				const allNames = Array.from(this.participants.keys());
				let names = allNames;
				if (this.tempExclusions && this.tempExclusions.size) names = names.filter(n => !this.tempExclusions.has(n));
				if (this.excludedWinners && this.excludedWinners.size) names = names.filter(n => !this.excludedWinners.has(n));
				if (names.length === 0) {
					el.className = 'empty-wheel';
						el.style.transform = 'rotate(0deg)';
					el.style.background = '';
					// Only show the waiting message after a giveaway has started
					let msg;
					const displayKeyword = ((this.keywordPrefix || '') + (this.keywordText || '')).trim();
					if (this.giveawayActive) {
						msg = this.isConnected ? `Waiting for participants...<br/>Type "${displayKeyword}" in chat to join!` : 'Connect and set a keyword to start collecting participants.';
					} else {
						msg = this.isConnected ? 'Start a giveaway to collect participants.' : 'Connect, set a keyword, then start a giveaway to collect participants.';
					}
					el.innerHTML = `<div id="emptyWheelContent" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:16px;">
						<div id="emptyWheelCountdown" style="display:none;margin-bottom:6px;font-weight:800;"></div>
						<div>${msg}</div>
					</div>`;
					this.elements.spinBtn.disabled = true;
					if (info) info.textContent = this.participants.size === 0 ? 'No participants yet' : 'No eligible participants';
					if (this.wheel && this.wheel.destroy) { try { this.wheel.destroy(); } catch {} }
					// Clear color mapping when no slices
					this.sliceColorMap = null;
					this.wheel = null;
					return;
				}
				this.elements.spinBtn.disabled = false;
				el.className = 'wheel';
				el.style.position = 'relative';
				el.innerHTML = '';
				this._renderSpinWheel(names);
				if (info) info.textContent = `${names.length} participant${names.length===1?'':'s'} on the wheel`;
			}

			_renderSpinWheel(names) {
				const el = this.elements.wheelElement;
				el.innerHTML = '';
				// Remember names to keep indices stable
				this.luckyNames = names.slice();
				// If container hasn't sized yet, try again shortly
				const w = el.clientWidth, h = el.clientHeight;
				if (!w || !h) { setTimeout(() => { try { this._renderSpinWheel(names); } catch {} } , 100); return; }
				const host = document.createElement('div');
				host.style.position = 'absolute';
				host.style.left = '0';
				host.style.top = '0';
				host.style.width = '100%';
				host.style.height = '100%';
				host.style.background = 'radial-gradient(300px 300px at 50% 50%, rgba(0,0,0,0.1), rgba(0,0,0,0) 70%)';
				el.appendChild(host);
				// Theme-aligned palette: cool teals, cyans, blues, violets, and pinks
				const colors = [
					'#0ea5a3', // teal 600
					'#06b6d4', // cyan 500
					'#22d3ee', // cyan 400
					'#38bdf8', // sky 400
					'#3b82f6', // blue 500
					'#6366f1', // indigo 500
					'#7c3aed', // violet 600
					'#8b5cf6', // violet 500
					'#a78bfa', // violet 300
					'#c084fc', // violet 400
					'#d946ef', // fuchsia 500
					'#ec4899', // pink 500
					'#f472b6', // pink 400
					'#10b981'  // emerald 500 (accent)
				];
				const pickTextColor = (hex) => {
					const h = hex.replace('#','');
					const r = parseInt(h.substring(0,2),16);
					const g = parseInt(h.substring(2,4),16);
					const b = parseInt(h.substring(4,6),16);
					const luminance = 0.2126*(r/255) + 0.7152*(g/255) + 0.0722*(b/255);
					return luminance > 0.6 ? '#111827' : '#f9fafb';
				};
				const items = names.map((name, i) => ({
					label: name,
					backgroundColor: colors[i % colors.length],
					labelColor: pickTextColor(colors[i % colors.length])
				}));
				// Build map for participant color coding
				this.sliceColorMap = new Map();
				for (const it of items) this.sliceColorMap.set(it.label, it.backgroundColor);
				this.wheel = new SimpleCanvasWheel(host, {
					items,
					onSpin: () => { this._lastTickStep = null; },
					onCurrentIndexChange: (e) => {
						if (!this.enableTick) return;
						if (this._lastTickStep !== e.currentIndex) { this._lastTickStep = e.currentIndex; this._playTick(); }
					},
					onRest: (e) => {
						try {
							let idx = (typeof this._pendingWinnerIndex === 'number') ? this._pendingWinnerIndex : e.currentIndex;
							if (typeof idx !== 'number' || isNaN(idx)) idx = 0;
							let winner = undefined;
							if (Array.isArray(this.luckyNames) && this.luckyNames.length) {
								const safeIdx = Math.max(0, Math.min(idx|0, this.luckyNames.length-1));
								winner = this.luckyNames[safeIdx];
							}
							if (!winner) return;
							this.showWinner(winner);
							this.isSpinning = false;
							this.elements.spinBtn.disabled = false;
							this.elements.spinBtn.textContent = 'Spin Again';
							if (this.tempExclusions) this.tempExclusions.clear();
							this.recordWinner(winner, (this.luckyNames || names));
							// Do not re-render the wheel here so the winning slice remains visible
							// until the user closes the modal or chooses to re-spin (which will re-render).
						} catch (err) {
							console.warn('Wheel onRest handler error', err);
							this.isSpinning = false;
							this.elements.spinBtn.disabled = false;
							this.elements.spinBtn.textContent = 'Spin Again';
						}
					}
				});
				// Update participant list to reflect colors
				this.renderParticipants();
			}


			spinWheel() {
				if (this.isSpinning || this.participants.size === 0) return;
				this.isSpinning = true;
				// Ensure there is an active giveaway session so multiple spins group in history
				if (!this.giveawaySessionId) {
					this.giveawaySessionId = 'g-' + Date.now();
					if (!this.entryStartTime) this.entryStartTime = Date.now();
					// Do not set currentHistoryIndex here; it'll be established on first recordWinner()
				}
				// Lock entries for the draw
				this.keywordActive = false;
				this.elements.lockBtn.textContent = 'Unlock Entries';
				this.elements.spinBtn.disabled = true;
				this.elements.spinBtn.textContent = 'Spinning...';
				const allNames = Array.from(this.participants.keys());
				let names = this.luckyNames && Array.isArray(this.luckyNames) && this.luckyNames.length ? this.luckyNames.slice() : allNames;
				if (this.tempExclusions && this.tempExclusions.size) names = names.filter(n => !this.tempExclusions.has(n));
				if (this.excludedWinners && this.excludedWinners.size) names = names.filter(n => !this.excludedWinners.has(n));
				if (names.length === 0) { this.isSpinning = false; this.elements.spinBtn.disabled = false; this.elements.spinBtn.textContent = 'Spin the Wheel'; return; }
					// Ensure overlay timer is hidden when wheel is empty
					if (this.elements.entryOverlay) this.elements.entryOverlay.style.display = 'none';
				const winnerIndex = Math.floor(Math.random() * names.length);
				if (this.wheel && this.wheel.spinToIndex) {
					this._pendingWinnerIndex = winnerIndex;
					this.wheel.spinToIndex(winnerIndex, 5000, 3);
					return;
				}
				this.showToast('Wheel is not ready', 'warn');
				this.isSpinning = false;
				this.elements.spinBtn.disabled = false;
				this.elements.spinBtn.textContent = 'Spin the Wheel';
			}

			reSpinExcludeCurrentWinner() {
				if (!this.currentWinner) return;
				if (!this.tempExclusions) this.tempExclusions = new Set();
				this.tempExclusions.add(this.currentWinner);
				// Permanently exclude so they do not appear in future wheels
				if (!this.excludedWinners) this.excludedWinners = new Set();
				this.excludedWinners.add(this.currentWinner.toLowerCase());
				this.closeWinnerModal();
				this.renderWheel();
				const eligible = Array.from(this.participants.keys()).filter(n => !this.tempExclusions.has(n));
				if (eligible.length === 0) {
					this.showToast('No eligible participants left to re-spin.', 'warn');
					this.tempExclusions.clear();
					return;
				}
				this.spinWheel();
			}

			showWinner(winner) {
				const fd = this.participants.get(winner)?.followData;
				this.currentWinner = (winner || '').toLowerCase();
				this.winnerAcknowledged = false;
				// Stop any lingering sad faces from previous round
				this.sadStopRequested = true;
				try { const c = document.getElementById('confettiCanvas'); if (c) { const x = c.getContext('2d'); x.clearRect(0,0,c.width,c.height); } } catch {}
				this.elements.winnerName.textContent = winner;
				this.elements.winnerMeta.textContent = (APP_CONFIG.enableFollowerInfo && fd) ? `${fd.isFollower ? 'Follower' : 'Not Following'} • ${fd.followDurationText}` : '';
				this.elements.winnerChat.innerHTML = '';
				this.elements.winnerChat.style.display = 'none';
				// Initialize timer/progress UI; may be hidden for infinite timer
				if (this.winnerTimerMinutes === 0) {
					this.elements.winnerTimer.textContent = '';
					if (this.elements.winnerProgress && this.elements.winnerProgress.parentElement) this.elements.winnerProgress.parentElement.style.display = 'none';
				} else {
					this.elements.winnerTimer.textContent = '00:00';
					if (this.elements.winnerProgress) { this.elements.winnerProgress.style.width = '100%'; this.elements.winnerProgress.classList.remove('low'); }
					if (this.elements.winnerProgress && this.elements.winnerProgress.parentElement) this.elements.winnerProgress.parentElement.style.display = '';
				}
				this.elements.winnerModal.style.display = 'flex';
				this.startWinnerTimer();
				if (this.enableConfetti) this.launchConfetti();
			}

			closeWinnerModal() {
				this.elements.winnerModal.style.display = 'none';
				this.stopWinnerTimer();
				// Ensure any sad faces effect is stopped and cleared
				this.sadStopRequested = true;
				try { const c = document.getElementById('confettiCanvas'); if (c) { const x = c.getContext('2d'); x.clearRect(0,0,c.width,c.height); } } catch {}
				// When closing, exclude the current winner going forward so the slice is removed after user has seen it
				if (this.currentWinner) {
					if (!this.excludedWinners) this.excludedWinners = new Set();
					this.excludedWinners.add(this.currentWinner.toLowerCase());
					this.renderWheel();
				}
				this.currentWinner = null;
				this.winnerAcknowledged = false;
				this.autoReSpinTriggered = false;
			}

			startWinnerTimer() {
				this.winnerStartTime = Date.now();
				this.autoReSpinTriggered = false;
				if (this.winnerTimerInterval) clearInterval(this.winnerTimerInterval);
				this.winnerTotalSeconds = Math.max(0, Math.floor(this.winnerTimerMinutes * 60));
				// If timer is set to 0, treat as infinite: hide progress, no countdown
				if (this.winnerTimerMinutes === 0) {
					if (this.elements.winnerProgress && this.elements.winnerProgress.parentElement) this.elements.winnerProgress.parentElement.style.display = 'none';
					this.elements.winnerTimer.textContent = '';
					this.winnerTimerInterval = null;
					return;
				}
				// Normal countdown mode
				if (this.elements.winnerProgress && this.elements.winnerProgress.parentElement) this.elements.winnerProgress.parentElement.style.display = '';
				this.updateWinnerTimer();
				this.winnerTimerInterval = setInterval(()=>this.updateWinnerTimer(), 1000);
			}

			stopWinnerTimer() {
				if (this.winnerTimerInterval) clearInterval(this.winnerTimerInterval);
				this.winnerTimerInterval = null;
				// stop confetti if it's running
				this.confettiStopRequested = true;
			}

			updateWinnerTimer() {
				// Infinite mode: no countdown or auto-expire
				if (this.winnerTimerMinutes === 0) {
					this.elements.winnerTimer.textContent = '';
					if (this.elements.winnerProgress && this.elements.winnerProgress.parentElement) this.elements.winnerProgress.parentElement.style.display = 'none';
					return;
				}
				const elapsed = Math.max(0, Math.floor((Date.now()-this.winnerStartTime)/1000));
				const totalSeconds = this.winnerTotalSeconds ?? Math.max(0, Math.floor(this.winnerTimerMinutes*60));
				const remaining = Math.max(0, totalSeconds - elapsed);
				const mm = String(Math.floor(remaining/60)).padStart(2,'0');
				const ss = String(remaining%60).padStart(2,'0');
				this.elements.winnerTimer.textContent = `${mm}:${ss}`;
				// update reverse progress bar
				if (this.elements.winnerProgress) {
					const pct = totalSeconds > 0 ? Math.max(0, Math.min(1, remaining / totalSeconds)) : 0;
					this.elements.winnerProgress.style.width = `${Math.round(pct*100)}%`;
					if (pct <= 0.25) this.elements.winnerProgress.classList.add('low'); else this.elements.winnerProgress.classList.remove('low');
				}
				if (remaining <= 0) {
					this.stopWinnerTimer();
					if (!this.winnerAcknowledged && !this.autoReSpinTriggered) {
						this.autoReSpinTriggered = true;
						if (this.enableSad) this.launchSadFaces();
						// Do not auto re-spin; keep modal open for manual action
						this.elements.winnerTimer.textContent = 'Time is up';
					}
				}
			}

			appendWinnerMessage(username, text) {
				const div = document.createElement('div');
				div.style.marginBottom = '6px';
				div.innerHTML = `<strong>${username}</strong>: ${this.escapeHtml(text)}`;
				// Make the chat box visible on first message
				if (this.elements.winnerChat.style.display === 'none') {
					this.elements.winnerChat.style.display = 'block';
				}
				this.elements.winnerChat.appendChild(div);
				this.elements.winnerChat.scrollTop = this.elements.winnerChat.scrollHeight;
			}

			escapeHtml(s){ return (s||'').replace(/[&<>"]|' /g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

			_playTick() {
				try {
					if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
					const ctx = this.audioCtx;
					const osc = ctx.createOscillator();
					const gain = ctx.createGain();
					osc.type = 'square';
					osc.frequency.setValueAtTime(1200, ctx.currentTime);
					gain.gain.setValueAtTime(0.0001, ctx.currentTime);
					gain.gain.exponentialRampToValueAtTime(0.06, ctx.currentTime + 0.001);
					gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.04);
					osc.connect(gain); gain.connect(ctx.destination);
					osc.start(); osc.stop(ctx.currentTime + 0.05);
				} catch {}
			}

			launchConfetti() {
				// Confetti lasts for the winner timer duration (in seconds), or until stopped
				const canvas = document.getElementById('confettiCanvas');
				const ctx = canvas.getContext('2d');
				canvas.width = window.innerWidth; canvas.height = window.innerHeight;
				const colors = ['#ff6b6b','#feca57','#54a0ff','#5f27cd','#1dd1a1'];
				// Reduce density by ~50%
				const N = 100;
				const parts = Array.from({length:N},()=>({
					x: Math.random()*canvas.width,
					y: -20 - Math.random()*canvas.height*0.5,
					r: 4+Math.random()*6,
					c: colors[Math.floor(Math.random()*colors.length)],
					vx: -2+Math.random()*4,
					vy: 2+Math.random()*3,
					spin: Math.random()*Math.PI,
					vr: -0.2 + Math.random()*0.4,
				}));
				// duration equals configured winner timer seconds
				const totalSec = this.winnerTotalSeconds ?? Math.max(0, Math.floor(this.winnerTimerMinutes*60));
				const endAt = totalSec > 0 ? (Date.now() + (totalSec * 1000)) : Number.POSITIVE_INFINITY;
				this.confettiStopRequested = false;
				const step = () => {
					ctx.clearRect(0,0,canvas.width,canvas.height);
					for (const p of parts){
						p.x += p.vx; p.y += p.vy; p.spin += p.vr;
						if (p.y > canvas.height+20) { p.y = -10; p.x = Math.random()*canvas.width; }
						ctx.save();
						ctx.translate(p.x, p.y);
						ctx.rotate(p.spin);
						ctx.fillStyle = p.c;
						ctx.fillRect(-p.r, -p.r, p.r*2, p.r*2);
						ctx.restore();
					}
					if (Date.now() < endAt && !this.confettiStopRequested) {
						requestAnimationFrame(step);
					} else {
						ctx.clearRect(0,0,canvas.width,canvas.height);
					}
				};
				requestAnimationFrame(step);
			}

			launchSadFaces(durationMs) {
				// Use same canvas to render falling sad faces; runs until stopped (or optional duration lapses)
				const canvas = document.getElementById('confettiCanvas');
				const ctx = canvas.getContext('2d');
				canvas.width = window.innerWidth; canvas.height = window.innerHeight;
				// Reduced density to ~25% of previous (80 -> 20)
				const faces = Array.from({length: 20}, ()=>({
					x: Math.random()*canvas.width,
					y: -20 - Math.random()*canvas.height*0.5,
					vy: 2+Math.random()*2.5,
					size: 24+Math.random()*18,
					spin: Math.random()*Math.PI,
					vr: -0.05 + Math.random()*0.1,
					alpha: 0.85
				}));
				const sad = '😢';
				const hasDuration = typeof durationMs === 'number' && durationMs > 0;
				const endAt = hasDuration ? (Date.now() + durationMs) : Number.POSITIVE_INFINITY;
				this.sadStopRequested = false;
				const step = () => {
					ctx.clearRect(0,0,canvas.width,canvas.height);
					for (const f of faces){
						f.y += f.vy; f.spin += f.vr;
						if (f.y > canvas.height+40) { f.y = -10; f.x = Math.random()*canvas.width; }
						ctx.save();
						ctx.translate(f.x, f.y);
						ctx.rotate(f.spin);
						ctx.globalAlpha = f.alpha;
						ctx.font = `${f.size}px system-ui, Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji`;
						ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
						ctx.fillText(sad, 0, 0);
						ctx.restore();
					}
					if (!this.sadStopRequested && Date.now() < endAt) {
						requestAnimationFrame(step);
					} else {
						ctx.clearRect(0,0,canvas.width,canvas.height);
					}
				};
				requestAnimationFrame(step);
			}

			async clearParticipants() {
				const ok = await this.showConfirm('Clear all participants?', 'This will remove everyone from the current list.');
				if (!ok) return;
				this.participants.clear();
				this.excludedWinners = new Set();
				this.keywordActive = true;
				this.elements.lockBtn.textContent = 'Lock Entries';
				this.elements.wheelElement.style.transform = 'rotate(0deg)';
				this.elements.spinBtn.textContent = 'Spin the Wheel';
				this.saveToStorage();
				this.render();
			}

			showToast(msg, type='info') {
				const wrap = document.createElement('div');
				wrap.style.padding = '10px 12px';
				wrap.style.borderRadius = '10px';
				wrap.style.fontWeight = '800';
				wrap.style.backdropFilter = 'blur(8px)';
				wrap.style.boxShadow = '0 10px 30px rgba(0,0,0,0.35), 0 0 0 1px rgba(148,163,184,0.2) inset';
				wrap.style.color = '#e8ecf1';
				wrap.style.maxWidth = '320px';
				wrap.style.transition = 'transform .2s ease, opacity .2s ease';
				wrap.style.transform = 'translateY(10px)';
				wrap.style.opacity = '0';
				wrap.style.background = type==='error' ? 'rgba(239,68,68,0.18)' : (type==='warn' ? 'rgba(245,158,11,0.18)' : 'rgba(8,12,22,0.7)');
				wrap.textContent = msg;
				this.elements.toastContainer.appendChild(wrap);
				requestAnimationFrame(()=>{ wrap.style.transform='translateY(0)'; wrap.style.opacity='1'; });
				setTimeout(()=>{
					wrap.style.transform='translateY(10px)'; wrap.style.opacity='0';
					setTimeout(()=>{ wrap.remove(); }, 200);
				}, 3000);
			}

			showConfirm(message, title='Please confirm') {
				return new Promise((resolve)=>{
					this._confirmResolve = resolve;
					this.elements.confirmTitle.textContent = title;
					this.elements.confirmMessage.textContent = message;
					this.elements.confirmModal.style.display = 'flex';
				});
			}

			_resolveConfirm(val){
				if (this._confirmResolve) this._confirmResolve(!!val);
				this._confirmResolve = null;
				this.elements.confirmModal.style.display = 'none';
			}

			renderHistory() {
				const el = this.elements.historyList;
				el.innerHTML = '';
				if (this.history.length === 0) { el.innerHTML = '<div style="opacity:.9">No giveaways yet.</div>'; return; }
				const recent = this.history.slice(0, 5);
				for (const h of recent) {
					const d = new Date(h.updatedAt || h.endedAt || h.startedAt || h.at || Date.now());
					const ts = d.toLocaleString(undefined, {
						year: 'numeric', month: 'short', day: '2-digit',
						hour: '2-digit', minute: '2-digit', second: '2-digit',
						hour12: false
					});
					const div = document.createElement('div');
					div.className = 'participant-item';
					const winners = Array.isArray(h.winners) ? h.winners : (h.winner ? [h.winner] : []);
					const winnersText = winners.length ? winners.join(', ') : '—';
					div.innerHTML = `<div><div style="font-weight:800">${h.keyword}</div><div style="font-size:12px;opacity:.9">${ts}</div></div><div style="text-align:right"><div style="font-size:12px;opacity:.9">Winner${winners.length>1?'s':''}</div><div style="font-weight:800; max-width:260px;">${winnersText}</div></div>`;
					el.appendChild(div);
				}
			}

			recordWinner(winner, participantsSnapshot) {
				const sessionId = this.giveawaySessionId || ('g-' + (this.entryStartTime || Date.now()));
				// If we already have an entry for this session, append; otherwise create one
				if (this.currentHistoryIndex != null) {
					const cur = this.history[this.currentHistoryIndex];
					if (cur && cur.sessionId === sessionId) {
						if (!Array.isArray(cur.winners)) cur.winners = [];
						cur.winners.push(winner);
						cur.updatedAt = Date.now();
						this.saveToStorage();
						this.renderHistory();
						return;
					}
				}
				// Create a new entry at the top
				const entry = {
					sessionId,
					keyword: this.keyword,
					winners: [winner],
					participants: participantsSnapshot,
					startedAt: this.entryStartTime || Date.now(),
					updatedAt: Date.now()
				};
				this.history.unshift(entry);
				this.currentHistoryIndex = 0;
				this.saveToStorage();
				this.renderHistory();
			}

			saveToStorage() {
				try {
					const participantsArr = Array.from(this.participants.entries());
					localStorage.setItem('mw.participants', JSON.stringify(participantsArr));
					localStorage.setItem('mw.history', JSON.stringify(this.history));
					localStorage.setItem('mw.clientId', this.elements.clientIdInput.value.trim());
					localStorage.setItem('mw.channel', this.elements.channelInput.value.trim());
					localStorage.setItem('mw.keyword', this.keyword);
					localStorage.setItem('mw.keywordPrefix', this.keywordPrefix || '');
					localStorage.setItem('mw.keywordText', this.keywordText || '');
					localStorage.setItem('mw.timerMinutes', String(this.winnerTimerMinutes));
					localStorage.setItem('mw.entryMinutes', String(this.entryTimerMinutes));
					localStorage.setItem('mw.hideSensitive', this.elements.hideSensitive.checked ? '1' : '0');
					localStorage.setItem('mw.confetti', this.enableConfetti ? '1' : '0');
					localStorage.setItem('mw.sad', this.enableSad ? '1' : '0');
					localStorage.setItem('mw.tick', this.enableTick ? '1' : '0');
				} catch {}
			}

			restoreFromStorage() {
				try {
					const sClient = localStorage.getItem('mw.clientId') || '';
					const sChannel = localStorage.getItem('mw.channel') || '';
					const sKeyword = localStorage.getItem('mw.keyword') || '!giveaway';
					const sKwPrefix = localStorage.getItem('mw.keywordPrefix');
					const sKwText = localStorage.getItem('mw.keywordText');
					const sTimer = localStorage.getItem('mw.timerMinutes');
					const sEntry = localStorage.getItem('mw.entryMinutes');
					const sHide = localStorage.getItem('mw.hideSensitive') === '1';
					const sConfetti = localStorage.getItem('mw.confetti');
					const sSad = localStorage.getItem('mw.sad');
					const sTick = localStorage.getItem('mw.tick');
					const sParts = JSON.parse(localStorage.getItem('mw.participants') || '[]');
					const sHist = JSON.parse(localStorage.getItem('mw.history') || '[]');

					if (sClient) this.elements.clientIdInput.value = sClient;
					if (sChannel) this.elements.channelInput.value = sChannel;
					// Prefer separate storage; fallback to combined keyword
					if (sKwPrefix !== null || sKwText !== null) {
						this.elements.keywordPrefixInput.value = (sKwPrefix ?? '!');
						this.elements.keywordInput.value = (sKwText ?? 'giveaway');
					} else if (sKeyword) {
						if (sKeyword.startsWith('!')) {
							this.elements.keywordPrefixInput.value = '!';
							this.elements.keywordInput.value = sKeyword.slice(1);
						} else {
							this.elements.keywordPrefixInput.value = '!';
							this.elements.keywordInput.value = sKeyword;
						}
					} else if (APP_CONFIG.defaults) {
						// No saved keyword; apply configured defaults
						this.elements.keywordPrefixInput.value = APP_CONFIG.defaults.keywordPrefix ?? '!';
						this.elements.keywordInput.value = APP_CONFIG.defaults.keywordText ?? 'giveaway';
					}
					if (sTimer) this.elements.winnerTimerMinutesInput.value = sTimer; else if (APP_CONFIG.defaults) this.elements.winnerTimerMinutesInput.value = String(APP_CONFIG.defaults.winnerTimerMinutes ?? 2);
					if (sEntry) this.elements.entryTimerMinutesInput.value = sEntry; else if (APP_CONFIG.defaults) this.elements.entryTimerMinutesInput.value = String(APP_CONFIG.defaults.entryTimerMinutes ?? 0);
					this.elements.hideSensitive.checked = sHide;
					this.enableConfetti = sConfetti == null ? (APP_CONFIG.features?.confetti ?? true) : sConfetti === '1';
					if (this.elements.confettiToggle) this.elements.confettiToggle.checked = this.enableConfetti;
					this.enableSad = sSad == null ? (APP_CONFIG.features?.sad ?? true) : sSad === '1';
					if (this.elements.sadToggle) this.elements.sadToggle.checked = this.enableSad;
					this.enableTick = sTick == null ? (APP_CONFIG.features?.tick ?? true) : sTick === '1';
					if (this.elements.tickToggle) this.elements.tickToggle.checked = this.enableTick;
					this.clientId = this.elements.clientIdInput.value.trim();
					this.channelName = (this.elements.channelInput.value || '').trim().toLowerCase();
					this.keywordPrefix = (this.elements.keywordPrefixInput.value || '!').trim();
					this.keywordText = (this.elements.keywordInput.value || 'giveaway').trim();
					this.keyword = ((this.keywordPrefix || '') + (this.keywordText || '')).trim();
					const parsedTimer = parseInt(this.elements.winnerTimerMinutesInput.value, 10);
					if (!isNaN(parsedTimer) && parsedTimer >= 0) this.winnerTimerMinutes = parsedTimer;
					const parsedEntry = parseInt(this.elements.entryTimerMinutesInput.value, 10);
					if (!isNaN(parsedEntry) && parsedEntry >= 0) this.entryTimerMinutes = parsedEntry;

					this.participants = new Map(sParts);
					this.history = Array.isArray(sHist) ? sHist : [];
					// apply initial hiding of sensitive fields
					this.applyHideSensitive();
					// Ensure lock button label reflects initial state
					if (this.elements && this.elements.lockBtn) {
						this.elements.lockBtn.textContent = this.keywordActive ? 'Lock Entries' : 'Unlock Entries';
					}
				} catch {}
			}
		}

		const app = new TwitchGiveawayApp();
	</script>
</body>
